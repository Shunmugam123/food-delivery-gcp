<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order - Figgy Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Place Your Order</h1>
        <form id="orderForm">
            <div class="form-group">
                <label for="restaurantId">Restaurant ID:</label>
                <input type="text" id="restaurantId" name="restaurantId" required>
            </div>
            <div class="form-group">
                <label for="items">Order Items (comma-separated):</label>
                <input type="text" id="items" name="items" placeholder="e.g., Pizza, Coke, Salad" required>
            </div>
            <div class="form-group">
                <label for="deliveryAddress">Delivery Address:</label>
                <textarea id="deliveryAddress" name="deliveryAddress" rows="3" required></textarea>
            </div>
            <button type="submit">Place Order</button>
        </form>
        <div id="message" class="message"></div>

        <div id="orderStatusSection" style="display: none;">
            <h2>Order Status</h2>
            <p>Order ID: <span id="orderIdDisplay"></span></p>
            <p>Status: <span id="orderStatusDisplay"></span></p>
            <p>Estimated Waiting Time: <span id="waitingTimeDisplay"></span> minutes</p>
            <button id="updateStatusBtn" style="display: none;">Update Status (Admin)</button>
             <select id="newStatusSelect" style="display: none;">
                <option value="ACCEPTED">ACCEPTED</option>
                <option value="PREPARING">PREPARING</option>
                <option value="PICKED_UP">PICKED_UP</option>
                <option value="DELIVERED">DELIVERED</option>
            </select>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
