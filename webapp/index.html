<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order - Figgy Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Place Your Order</h1>
        <form id="orderForm">
            <div class="form-group">
                <label for="restaurantId">Restaurant ID:</label>
                <input type="text" id="restaurantId" name="restaurantId" required>
            </div>
            <div class="form-group">
                <label for="items">Order Items (comma-separated):</label>
                <input type="text" id="items" name="items" placeholder="e.g., Pizza, Coke, Salad" required>
            </div>
            <div class="form-group">
                <label for="deliveryAddress">Delivery Address:</label>
                <textarea id="deliveryAddress" name="deliveryAddress" rows="3" required></textarea>
            </div>
            <button type="submit">Place Order</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
